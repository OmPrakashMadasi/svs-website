{% block content %}

<div class="container mt-4 mb-3" style="font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif; background-color: #f8e6d6; width: 50%; padding-bottom: 3px; border: 1px solid #033F3D;border-radius: 50px;">
    <div class="form-container">
        <h4 style="text-align: center;font-size: 50px;padding-top: 20px;color: white;">Register</h4>
        <div class="container mt-5 mb-4 mx-auto" style="max-width: 500px;">
            <!-- Full Name Field -->
            <div class="input-group mb-4 ">

                <input type="text" class="form-control border-0 py-2" placeholder="Full Name" required
                    autocomplete="off">
            </div>

            <!-- Email or Phone Number Field with Icon -->
            <div class="input-group mb-4 ">
                <span class="input-group-text border-0 bg-white">
                    <i class="bi bi-envelope-fill text-muted"></i>
                </span>
                <input type="text" class="form-control border-0 py-2" placeholder="Email or phone number" required
                    autocomplete="off">
            </div>

            <div class="input-group mb-4  mb-3 position-relative">
                <span class="input-group-text border-0 bg-white" style="padding-right: 10px;">
                    <i class="fa fa-lock" style="color: #6c757d;"></i>
                </span>
                <input type="password" id="password1" class="form-control border-0 py-2" placeholder="Enter Password" required autocomplete="off">
                <i class="fa fa-eye position-absolute" id="togglePassword1" style="right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer;" onclick="togglePasswordVisibility('password1', 'togglePassword1')"></i>
            </div>
            
            <div class="input-group mb-4 mb-3 position-relative">
                <span class="input-group-text border-0 bg-white" style="padding-right: 10px;">
                    <i class="fa fa-lock" style="color: #6c757d;"></i>
                </span>
                <input type="password" id="password2" class="form-control border-0 py-2" placeholder="Enter Password" required autocomplete="off">
                <i class="fa fa-eye position-absolute" id="togglePassword2" style="right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer;" onclick="togglePasswordVisibility('password2', 'togglePassword2')"></i>
            </div>

            <!-- Remember Me and Forgot Password -->
            <div class="d-flex justify-content-between align-items-center mt-3" style="margin-left: 10px;">
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" id="rememberMe">
                    <label class="form-check-label" for="rememberMe">Remember me</label>
                </div>
                <a href="#" class="text-dark text-decoration-underline">Forgot password?</a>
            </div>

            <!-- Login Button -->
            <div class="d-flex justify-content-center mt-4">
                <button class="btn" style="background-color: skyblue; color:white;width: 150px;">
                    <b>Log in</b>
                </button>
            </div>

            <!-- Social Login Options -->
            <div class="text-center mt-4">
                <p>Log in with</p>
                <div class="d-flex justify-content-center">
                    <a href="https://www.google.com" target="_blank">
                        <img src="https://53.fs1.hubspotusercontent-na1.net/hub/53/hubfs/image8-2.jpg?width=595&height=400&name=image8-2.jpg"
                            alt="Google" class="me-2 rounded border" style="width: 40px; height: 40px;">
                    </a>
                    <a href="https://www.facebook.com" target="_blank">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/c/cd/Facebook_logo_%28square%29.png"
                            alt="Facebook" class="rounded border" style="width: 40px; height: 40px;">
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>



<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const togglePassword1 = document.getElementById('toggle-password1');
        const togglePasswordIcon1 = document.getElementById('toggle-password-icon1');
        const passwordField1 = document.getElementById('id_password1');

        togglePassword1.addEventListener('click', function () {
            const type = passwordField1.type === 'password' ? 'text' : 'password';
            passwordField1.type = type;
            togglePasswordIcon1.classList.toggle('bi-eye');
            togglePasswordIcon1.classList.toggle('bi-eye-slash');
        });

        const togglePassword2 = document.getElementById('toggle-password2');
        const togglePasswordIcon2 = document.getElementById('toggle-password-icon2');
        const passwordField2 = document.getElementById('id_password2');

        togglePassword2.addEventListener('click', function () {
            const type = passwordField2.type === 'password' ? 'text' : 'password';
            passwordField2.type = type;
            togglePasswordIcon2.classList.toggle('bi-eye');
            togglePasswordIcon2.classList.toggle('bi-eye-slash');
        });
    });
    function togglePasswordVisibility(inputId, toggleIconId) {
    const passwordField = document.getElementById(inputId);
    const toggleIcon = document.getElementById(toggleIconId);

    // Toggle between password and text types
    if (passwordField.type === "password") {
        passwordField.type = "text";
        toggleIcon.classList.remove("fa-eye");
        toggleIcon.classList.add("fa-eye-slash");
    } else {
        passwordField.type = "password";
        toggleIcon.classList.remove("fa-eye-slash");
        toggleIcon.classList.add("fa-eye");
    }
}
</script>

<link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.0/font/bootstrap-icons.min.css">

{%endblock%}
